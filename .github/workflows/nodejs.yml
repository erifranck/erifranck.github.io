name: Node CI

on: 
  push:
    branches: 
      - develop
jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [10.16.0]

    steps:
    - uses: actions/checkout@v1
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node-version }} 
    - name: npm install, build, and test
      run: |
        git config --global user.email "erifranjose@hotmail.com"
        git config --global user.name "erifranck"
        npm install
        npm run deploy
      env:
        CI: true
